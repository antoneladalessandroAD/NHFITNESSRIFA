<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Administrador — Rifa NH-Fitness</title>
<style>
  :root{--naranja:#f7941e; --negro:#1a1a1a; --verde:#2ecc71; --rojo:#e74c3c; --amarillo:#f1c40f; --azul:#3498db;}
  *{box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif;}
  body{margin:0; background:#f4f4f4;}
  header{background:var(--negro); color:#fff; text-align:center; padding:15px;}
  header h2{margin:0; color:var(--naranja);}
  .stats{display:flex; justify-content:center; gap:14px; margin:15px 0; flex-wrap:wrap;}
  .stat-box{background:#fff; border-radius:10px; padding:10px 16px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,.15); min-width:95px;}
  .stat-box .num{font-size:22px; font-weight:bold;}
  .stat-box.vendidos .num{color:var(--rojo);}
  .stat-box.reservados .num{color:#b8860b;}
  .stat-box.disponibles .num{color:var(--verde);}
  .stat-box.recaudado .num{color:#2c3e50; font-size:18px;}
  .toolbar{display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin:10px auto; max-width:700px; padding:0 10px;}
  #buscador{flex:1; min-width:200px; padding:10px; border-radius:8px; border:1px solid #ccc;}
  #logoutBtn{padding:10px 15px; border:none; border-radius:8px; background:var(--naranja); color:var(--negro); font-weight:bold; cursor:pointer;}
  #exportBtn{padding:10px 15px; border:none; border-radius:8px; background:#2c3e50; color:#fff; font-weight:bold; cursor:pointer;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(58px,1fr)); gap:6px; max-width:1000px; margin:20px auto; padding:0 10px;}
  .numero{aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; border-radius:8px; font-weight:bold; color:#fff; cursor:pointer; font-size:13px; user-select:none; border:2px solid rgba(0,0,0,.15);}
  .disponible{background:var(--verde);}
  .vendido{background:var(--rojo);}
  .reservado{background:var(--amarillo); color:#1a1a1a;}
  .overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); align-items:center; justify-content:center; z-index:999; padding:15px;}
  .overlay.active{display:flex;}
  .modal{background:#fff; border-radius:12px; padding:20px; width:100%; max-width:360px; max-height:90vh; overflow-y:auto;}
  .modal h3{margin-top:0; text-align:center;}
  .modal label{display:block; margin-top:10px; font-size:14px; font-weight:bold;}
  .modal input{width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:6px;}
  .modal-buttons{display:flex; gap:10px; margin-top:18px; flex-wrap:wrap;}
  .modal-buttons button{flex:1; padding:10px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; min-width:90px;}
  .btn-guardar{background:var(--verde); color:#fff;}
  .btn-eliminar{background:var(--rojo); color:#fff;}
  .btn-cerrar{background:#ccc;}
  .loading{text-align:center; padding:20px; color:#888;}
  .grupo-lista{background:#f9f9f9; border-radius:8px; padding:10px; margin:10px 0; font-size:13px; max-height:120px; overflow-y:auto;}
</style>
</head>
<body>

<header><h2>🔒 Panel Administrador — Rifa NH-Fitness</h2></header>

<div id="pantallaLogin" style="max-width:360px; margin:40px auto; background:#fff; padding:20px; border-radius:12px;">
  <h3>Ingreso Administrador</h3>
  <label>Email</label>
  <input type="text" id="loginUser" placeholder="nhf@nhfitness.com" style="width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:6px;">
  <label>Contraseña</label>
  <input type="password" id="loginPass" style="width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:6px;">
  <button onclick="login()" style="width:100%; margin-top:15px; padding:10px; background:var(--verde); color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Ingresar</button>
</div>

<div id="panelAdmin" style="display:none;">
  <div class="stats">
    <div class="stat-box vendidos"><div class="num" id="countVendidos">0</div><div>Vendidos</div></div>
    <div class="stat-box reservados"><div class="num" id="countReservados">0</div><div>Pendientes de aprobación</div></div>
    <div class="stat-box disponibles"><div class="num" id="countDisponibles">1000</div><div>Disponibles</div></div>
    <div class="stat-box recaudado"><div class="num" id="totalRecaudado">$0</div><div>Recaudado</div></div>
  </div>

  <div class="toolbar">
    <input id="buscador" type="text" placeholder="Buscar número...">
    <button id="exportBtn" onclick="exportarExcel()">📥 Exportar Excel (vendidos + pendientes)</button>
    <button id="logoutBtn" onclick="logout()">Salir</button>
  </div>

  <div id="cargando" class="loading">Cargando números...</div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlayNumero">
  <div class="modal">
    <h3 id="tituloModal">Número 000</h3>
    <div id="infoEstado"></div>
    <div id="formularioAdmin">
      <p><b>Nombre:</b> <span id="verNombre">-</span></p>
      <p><b>Teléfono:</b> <span id="verContacto">-</span></p>
    </div>
    <div id="grupoContenedor"></div>
    <div class="modal-buttons" id="botonesModal"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, onSnapshot, updateDoc, orderBy, query
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqV6XxYj5HgWmNRXdOKvGa2aeYG-X3Rpc",
  authDomain: "nh-fitness-rifa-987f4.firebaseapp.com",
  projectId: "nh-fitness-rifa-987f4",
  storageBucket: "nh-fitness-rifa-987f4.firebasestorage.app",
  messagingSenderId: "115097433531",
  appId: "1:115097433531:web:9ba99c6b4e766d01ddc09e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const PRECIO_UNITARIO = 5000;

let numeros = [];
let esAdmin = false;

onAuthStateChanged(auth, (user) => {
  esAdmin = !!user;
  document.getElementById("pantallaLogin").style.display = esAdmin ? "none" : "block";
  document.getElementById("panelAdmin").style.display = esAdmin ? "block" : "none";
  if(esAdmin) iniciarEscuchaNumeros();
});

window.login = function(){
  const email = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value.trim();
  signInWithEmailAndPassword(auth, email, pass)
    .catch((err) => { alert("Usuario o contraseña incorrectos."); console.error(err); });
};

window.logout = function(){ signOut(auth); };

function iniciarEscuchaNumeros(){
  const q = query(collection(db, "numeros"), orderBy("__name__"));
  onSnapshot(q, (snapshot) => {
    numeros = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById("cargando").style.display = "none";
    render();
  });
}

function estadoDe(n){
  if(n.vendido) return "vendido";
  if(n.reservado) return "reservado";
  return "disponible";
}

window.render = function(){
  const grid = document.getElementById("grid");
  const filtro = document.getElementById("buscador").value.trim();
  grid.innerHTML = "";

  numeros.forEach(n=>{
    if(filtro && !n.id.includes(filtro)) return;
    const estado = estadoDe(n);
    const div = document.createElement("div");
    div.className = "numero " + estado;
    div.textContent = n.id;
    div.onclick = () => abrirModalAdmin(n);
    grid.appendChild(div);
  });

  let vendidos=0, reservados=0, disponibles=0;
  numeros.forEach(n=>{
    const estado = estadoDe(n);
    if(estado==="vendido") vendidos++;
    else if(estado==="reservado") reservados++;
    else disponibles++;
  });

  document.getElementById("countVendidos").textContent = vendidos;
  document.getElementById("countReservados").textContent = reservados;
  document.getElementById("countDisponibles").textContent = disponibles;
  document.getElementById("totalRecaudado").textContent = "$" + (vendidos*PRECIO_UNITARIO).toLocaleString("es-AR");
};

async function abrirModalAdmin(n){
  const estado = estadoDe(n);

  let grupo = [n];
  if((estado === "reservado" || estado === "vendido") && n.reservaId){
    grupo = numeros.filter(x => x.reservaId === n.reservaId);
    grupo.sort((a,b) => a.id.localeCompare(b.id));
  }

  const idsGrupo = grupo.map(x => x.id);

  document.getElementById("tituloModal").textContent =
    idsGrupo.length > 1 ? "Reserva grupal (" + idsGrupo.length + " números)" : "Número " + n.id;

  document.getElementById("verNombre").textContent = "-";
  document.getElementById("verContacto").textContent = "-";

  if(estado === "reservado" || estado === "vendido"){
    try{
      const snap = await getDoc(doc(db,"compradores_privados", n.id));
      if(snap.exists()){
        document.getElementById("verNombre").textContent = snap.data().nombre || "-";
        document.getElementById("verContacto").textContent = snap.data().contacto || "-";
      }
    }catch(err){ console.error(err); }
  }

  let estadoTexto = "";
  if(estado==="disponible") estadoTexto = "🟢 Disponible";
  if(estado==="reservado"){
    const restante = Math.max(0, Math.ceil((n.reservadoHasta - Date.now())/60000));
    estadoTexto = restante > 0
      ? `🟡 Reservado — dentro del plazo de 15 min (quedan ${restante} min)`
      : `🟡 Reservado — el plazo de 15 min ya venció, esperando que lo liberes o confirmes el pago`;
  }
  if(estado==="vendido") estadoTexto = "🔴 Vendido";
  document.getElementById("infoEstado").innerHTML = "<p><b>Estado:</b> "+estadoTexto+"</p>";

  const grupoContenedor = document.getElementById("grupoContenedor");
  if(idsGrupo.length > 1){
    grupoContenedor.innerHTML =
      "<p style='font-size:13px; margin-bottom:4px;'><b>Números incluidos en esta reserva:</b></p>" +
      "<div class='grupo-lista'>" + idsGrupo.join(", ") + "</div>";
  } else {
    grupoContenedor.innerHTML = "";
  }

  const botones = document.getElementById("botonesModal");
  botones.innerHTML = "";

  if(estado==="reservado"){
    const btnConfirmar = document.createElement("button");
    btnConfirmar.className = "btn-guardar";
    btnConfirmar.textContent = idsGrupo.length > 1 ? "✅ Confirmar pago (todo el grupo)" : "✅ Confirmar pago recibido";
    btnConfirmar.onclick = () => confirmarPagoAdmin(idsGrupo);
    botones.appendChild(btnConfirmar);

    const btnLiberar = document.createElement("button");
    btnLiberar.className = "btn-eliminar";
    btnLiberar.textContent = idsGrupo.length > 1 ? "Liberar grupo completo" : "Liberar número";
    btnLiberar.onclick = () => liberarNumeroAdmin(idsGrupo);
    botones.appendChild(btnLiberar);
  }

  if(estado==="vendido"){
    const btnLiberar = document.createElement("button");
    btnLiberar.className = "btn-eliminar";
    btnLiberar.textContent = idsGrupo.length > 1 ? "Anular venta (todo el grupo)" : "Anular venta";
    btnLiberar.onclick = () => liberarNumeroAdmin(idsGrupo);
    botones.appendChild(btnLiberar);
  }

  const btnCerrar = document.createElement("button");
  btnCerrar.className = "btn-cerrar";
  btnCerrar.textContent = "Cerrar";
  btnCerrar.onclick = cerrarModalAdmin;
  botones.appendChild(btnCerrar);

  document.getElementById("overlayNumero").classList.add("active");
}

async function confirmarPagoAdmin(ids){
  const lista = Array.isArray(ids) ? ids : [ids];
  for(const id of lista){
    await updateDoc(doc(db,"numeros",id), { vendido: true, reservado: false, reservadoHasta: null });
  }
  cerrarModalAdmin();
}

async function liberarNumeroAdmin(ids){
  const lista = Array.isArray(ids) ? ids : [ids];
  for(const id of lista){
    await updateDoc(doc(db,"numeros",id), { vendido: false, reservado: false, reservadoHasta: null });
  }
  cerrarModalAdmin();
}

function cerrarModalAdmin(){
  document.getElementById("overlayNumero").classList.remove("active");
}

// Exportar a Excel real (formato HTML-table reconocido nativamente por Excel).
// Con este método las columnas quedan SIEMPRE bien separadas, sin importar
// la configuración regional del Excel de quien lo abra (a diferencia del CSV,
// que depende de si el separador esperado es coma o punto y coma).
window.exportarExcel = async function(){
  const vendidos = numeros.filter(n => n.vendido);
  const pendientes = numeros.filter(n => n.reservado);

  if(vendidos.length === 0 && pendientes.length === 0){
    alert("Todavía no hay números vendidos ni pendientes de aprobación para exportar.");
    return;
  }

  async function obtenerDatosComprador(n){
    try{
      const snap = await getDoc(doc(db,"compradores_privados", n.id));
      const data = snap.exists() ? snap.data() : {};
      return {
        numero: n.id,
        nombre: data.nombre || "Sin datos",
        telefono: data.contacto || "Sin datos",
        reservaId: data.reservaId || n.reservaId || "-",
        monto: PRECIO_UNITARIO
      };
    }catch(err){
      console.error(err);
      return { numero: n.id, nombre:"Sin datos", telefono:"Sin datos", reservaId:"-", monto:PRECIO_UNITARIO };
    }
  }

  const datosVendidos = (await Promise.all(vendidos.map(obtenerDatosComprador)))
    .sort((a,b) => a.numero.localeCompare(b.numero));

  const datosPendientes = (await Promise.all(pendientes.map(async (n) => {
    const base = await obtenerDatosComprador(n);
    const restanteMin = Math.max(0, Math.ceil((n.reservadoHasta - Date.now())/60000));
    return { ...base, vence: restanteMin > 0 ? restanteMin + " min" : "Plazo vencido" };
  }))).sort((a,b) => a.numero.localeCompare(b.numero));

  const totalVendidoRecaudado = datosVendidos.length * PRECIO_UNITARIO;
  const totalPendienteMonto = datosPendientes.length * PRECIO_UNITARIO;

  const estiloTitulo = "background:#1a1a1a; color:#fff; font-weight:bold; font-size:14px; padding:8px;";
  const estiloHeader = "background:#e0e0e0; font-weight:bold; padding:6px; border:1px solid #ccc;";
  const estiloCelda = "padding:6px; border:1px solid #ccc;";
  const estiloTotal = "background:#fff3cd; font-weight:bold; padding:6px; border:1px solid #ccc;";

  let filasVendidos = datosVendidos.map(c => `
    <tr>
      <td style="${estiloCelda}">${c.numero}</td>
      <td style="${estiloCelda}">${c.nombre}</td>
      <td style="${estiloCelda}">${c.telefono}</td>
      <td style="${estiloCelda}">${c.monto}</td>
      <td style="${estiloCelda}">${c.reservaId}</td>
    </tr>
  `).join("");

  let filasPendientes = datosPendientes.map(c => `
    <tr>
      <td style="${estiloCelda}">${c.numero}</td>
      <td style="${estiloCelda}">${c.nombre}</td>
      <td style="${estiloCelda}">${c.telefono}</td>
      <td style="${estiloCelda}">${c.monto}</td>
      <td style="${estiloCelda}">${c.reservaId}</td>
      <td style="${estiloCelda}">${c.vence}</td>
    </tr>
  `).join("");

  const htmlExcel = `
    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
    <head>
      <meta charset="UTF-8">
      <!--[if gte mso 9]>
      <xml>
        <x:ExcelWorkbook>
          <x:ExcelWorksheets>
            <x:ExcelWorksheet>
              <x:Name>Rifa NH</x:Name>
              <x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>
            </x:ExcelWorksheet>
          </x:ExcelWorksheets>
        </x:ExcelWorkbook>
      </xml>
      <![endif]-->
    </head>
    <body>
      <table border="1" cellspacing="0" cellpadding="0" style="border-collapse:collapse; font-family:Arial, sans-serif; font-size:13px;">
        <tr><td colspan="6" style="${estiloTitulo}">NÚMEROS VENDIDOS (PAGO CONFIRMADO)</td></tr>
        <tr>
          <th style="${estiloHeader}">Número</th>
          <th style="${estiloHeader}">Nombre y apellido</th>
          <th style="${estiloHeader}">Teléfono</th>
          <th style="${estiloHeader}">Monto pagado</th>
          <th style="${estiloHeader}">ID de reserva</th>
          <th style="${estiloHeader}"></th>
        </tr>
        ${filasVendidos}
        <tr>
          <td style="${estiloTotal}">TOTAL VENDIDOS</td>
          <td style="${estiloTotal}">${datosVendidos.length}</td>
          <td style="${estiloTotal}"></td>
          <td style="${estiloTotal}">${totalVendidoRecaudado}</td>
          <td style="${estiloTotal}"></td>
          <td style="${estiloTotal}"></td>
        </tr>
        <tr><td colspan="6" style="height:20px; border:none;"></td></tr>
        <tr><td colspan="6" style="${estiloTitulo}">NÚMEROS PENDIENTES DE APROBACIÓN (RESERVADOS, ESPERANDO CONFIRMACIÓN MANUAL)</td></tr>
        <tr>
          <th style="${estiloHeader}">Número</th>
          <th style="${estiloHeader}">Nombre y apellido</th>
          <th style="${estiloHeader}">Teléfono</th>
          <th style="${estiloHeader}">Monto a cobrar</th>
          <th style="${estiloHeader}">ID de reserva</th>
          <th style="${estiloHeader}">Estado del plazo</th>
        </tr>
        ${filasPendientes}
        <tr>
          <td style="${estiloTotal}">TOTAL PENDIENTES</td>
          <td style="${estiloTotal}">${datosPendientes.length}</td>
          <td style="${estiloTotal}"></td>
          <td style="${estiloTotal}">${totalPendienteMonto}</td>
          <td style="${estiloTotal}"></td>
          <td style="${estiloTotal}"></td>
        </tr>
      </table>
    </body>
    </html>
  `;

  const blob = new Blob(["\ufeff" + htmlExcel], { type: "application/vnd.ms-excel;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const fecha = new Date().toISOString().slice(0,10);
  const a = document.createElement("a");
  a.href = url;
  a.download = `rifa_nh_vendidos_y_pendientes_${fecha}.xls`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

document.getElementById("buscador")?.addEventListener("input", render);
</script>

</body>
</html>
